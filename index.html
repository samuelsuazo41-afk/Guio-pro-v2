<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0f12">
  <title>Guio-Pro Editorials</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
  <header>
    <h1>Guio-Pro</h1>
    <p>Generador de guions i llibres per editorials</p>
  </header>

  <main>
    <section id="menu">
      <div class="tabs-container">
        
        <div class="tab" data-tab="genere">
          <div class="tab-header">GÈNERE <span>▼</span></div>
          <div class="tab-content" id="genere-content"></div>
        </div>

        <div class="tab" data-tab="estructura">
          <div class="tab-header">ESTRUCTURA <span>▼</span></div>
          <div class="tab-content" id="estructura-content"></div>
        </div>

        <div class="tab" data-tab="mon">
          <div class="tab-header">MÓN <span>▼</span></div>
          <div class="tab-content" id="mon-content"></div>
        </div>

        <div class="tab" data-tab="personatges">
          <div class="tab-header">PERSONATGES <span>▼</span></div>
          <div class="tab-content" id="personatges-content"></div>
        </div>

        <div class="tab" data-tab="estil">
          <div class="tab-header">ESTIL <span>▼</span></div>
          <div class="tab-content" id="estil-content"></div>
        </div>

      </div>

      <div class="botons">
        <button id="btn-preview">Preview</button>
        <button id="btn-generar">Generar Guió</button>
        <button id="btn-exportar">Exportar .txt</button>
      </div>
    </section>

    <section id="resultat">
      <p style="color: var(--text-muted); text-align: center;">
        Configura els tabs i toca "Generar Guió"
      </p>
    </section>
  </main>

  <script type="module" src="main.js?v=2"></script>
</body>
</html>
